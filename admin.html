<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SALT Admin Dashboard</title><link rel="stylesheet" href="styles.css"><style>.dash{min-height:100vh;background:#f4f8f6}.dash-head{background:linear-gradient(135deg,#07543b,#1776d2);color:#fff;padding:26px}.dash-grid{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 95px)}.side{background:#fff;padding:24px;display:grid;align-content:start;gap:10px}.side button{border:0;background:#f2f7f5;padding:12px;border-radius:12px;text-align:left;font-weight:800}.content{padding:30px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.card{background:#fff;border-radius:20px;padding:22px;box-shadow:0 10px 25px rgba(0,0,0,.07)}.editor{margin-top:24px;background:#fff;padding:24px;border-radius:20px}.editor label{display:grid;gap:6px;margin:12px 0;font-weight:800}.editor input,.editor textarea{padding:12px;border:1px solid #d5e2dc;border-radius:12px}.warning{background:#fff5cf;border-left:5px solid #ffd44d;padding:13px;border-radius:12px}@media(max-width:800px){.dash-grid{grid-template-columns:1fr}.side{grid-template-columns:repeat(2,1fr)}.cards{grid-template-columns:1fr 1fr}}</style></head><body><header class="dash-head"><div class="container"><h1>SALT Admin Dashboard</h1><p>Content management prototype</p></div></header><main class="dash-grid"><aside class="side"><button>Overview</button><button>News & Events</button><button>Gallery</button><button>Profiles</button><button>Admissions</button><button>Donations</button><button>Parents</button><a href="index.html">← Website</a></aside><section class="content"><div class="warning"><strong>Prototype only:</strong> Saving, login and database functions require a secure backend.</div><div class="cards"><article class="card"><small>News posts</small><h2>3</h2></article><article class="card"><small>Gallery items</small><h2>8</h2></article><article class="card"><small>Applications</small><h2>0</h2></article><article class="card"><small>Profiles</small><h2>3</h2></article></div><div class="editor"><h2>Add News or Event</h2><label>Title<input placeholder="Event title"></label><label>Description<textarea rows="5" placeholder="Write the update..."></textarea></label><button class="btn btn-primary" onclick="alert('Connect Firebase or Supabase to save content securely.')">Save Draft</button></div></section></main></body></html>
