<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SALT Parent Portal</title><link rel="stylesheet" href="styles.css"><style>.auth-page{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#07543b,#1776d2,#7658df);padding:30px}.auth-card{width:min(470px,100%);background:#fff;border-radius:28px;padding:34px;box-shadow:var(--shadow)}.auth-card h1{font-family:Playfair Display,serif;font-size:2.5rem}.auth-card label{display:grid;gap:6px;margin:14px 0;font-weight:800}.auth-card input{padding:13px;border:1px solid #d6e4de;border-radius:13px;width:100%}.demo-note{background:#fff6cf;border-left:5px solid var(--yellow);padding:13px;border-radius:12px;margin:18px 0}.back{display:inline-block;margin-top:16px;color:var(--green);font-weight:900}</style></head><body><main class="auth-page"><section class="auth-card"><span class="eyebrow">Parent Portal</span><h1>Secure family access</h1><p>This is the portal design. A real login requires Firebase or Supabase authentication and a secure database.</p><div class="demo-note"><strong>Demo only:</strong> Do not enter private information until the secure backend is connected.</div><label>Email<input type="email" placeholder="parent@example.com"></label><label>Password<input type="password" placeholder="••••••••"></label><button class="btn btn-primary" type="button" onclick="alert('Secure login will work after Firebase or Supabase is connected.')">Sign In</button><a class="back" href="index.html">← Back to website</a></section></main></body></html>
